{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelKG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
   <header class="main-header">
        <div class="logo">Travel<span>KG</span></div>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav class="nav-menu" id="nav-menu">
            <a href="{% url 'index' %}" onclick="closeMenu()">Башкы бет</a>
            <a href="{% url 'about' %}" onclick="closeMenu()">Биз жөнүндө</a>
            <a href="{% url 'tours' %}" onclick="closeMenu()">Турлар</a>
            <a href="{% url 'contact' %}" onclick="closeMenu()">Байланыш</a>
            <button class="mobile-btn" onclick="openModal(); closeMenu();">Заказать звонок</button>
        </nav>

        <button class="btn-call desktop-btn" onclick="openModal()">Заказать звонок</button>
   </header>

    <main class="content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <div id="callbackModal" class="modal-overlay">
        <div class="modal-glass">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2>Биз сизге <span>чалып жатабыз</span></h2>
            <form class="modal-form" method="POST" action="{% url 'callback_request' %}">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Сиздин атыңыз" required>
                <input type="tel" name="phone" placeholder="+996 (___) __ __ __" required>
                <button type="submit" class="btn-submit-pro">Жиберүү</button>
            </form>
        </div>
    </div>
<script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    const navLinks = document.querySelectorAll('.nav-menu a, .mobile-btn');

    // Менюну ачуу жана жабуу
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        navMenu.classList.toggle('active');

        // Экранды тоңдуруу (Scroll lock)
        if (navMenu.classList.contains('active')) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = 'auto';
        }

        // Жазуулардын кезеги менен солдон оңго жылып чыгуусу
        navLinks.forEach((link, index) => {
            if (link.style.animation) {
                link.style.animation = '';
            } else {
                link.style.animation = `navLinkFade 0.5s ease forwards ${index / 7 + 0.3}s`;
            }
        });
    });

    // Шилтемени басканда меню жабылат
    function closeMenu() {
        hamburger.classList.remove('active');
        navMenu.classList.remove('active');
        document.body.style.overflow = 'auto';
        navLinks.forEach(link => link.style.animation = '');
    }
</script>
</body>
</html>
