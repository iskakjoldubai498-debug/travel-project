{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel KG | Premium Edition</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* --- 1. GOOGLE TRANSLATE ЖАШЫРУУ --- */
        .goog-te-banner-frame.skiptranslate, .goog-te-banner, #goog-gt-tt, .goog-te-balloon-frame, .skiptranslate {
            display: none !important; visibility: hidden !important;
        }
        body { top: 0px !important; position: static !important; }
        #google_translate_element { display: none !important; }

        /* --- НЕГИЗГИ Түстөр --- */
        :root {
            --primary-gradient: linear-gradient(45deg, #00d2ff, #3a7bd5);
            --accent-gradient: linear-gradient(45deg, #ff8c00, #ff5e62);
            --light-grey: #e2e8f0; /* Жаңы боз фон */
            --dark-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; transition: 0.4s ease; background-color: #f8fafc; overflow-x: hidden; color: #334155; }
        body.dark-mode { background-color: var(--dark-bg); color: #f1f5f9; }

        /* --- NAVBAR --- */
        .navbar {
            backdrop-filter: blur(15px);
            background: var(--light-grey) !important; /* Күндүзгү боз фон */
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 8px 0;
            z-index: 1050;
            transition: 0.3s;
        }
        body.dark-mode .navbar { background: rgba(15, 23, 42, 0.95) !important; border-bottom-color: rgba(255,255,255,0.1); }

        .navbar-brand { font-size: 22px; letter-spacing: 1px; color: #0f172a !important; }
        body.dark-mode .navbar-brand { color: white !important; }

        /* Мобилдик меню */
        @media (max-width: 991px) {
            .navbar-collapse {
                background: var(--light-grey);
                margin-top: 10px;
                border-radius: 15px;
                padding: 15px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            }
            body.dark-mode .navbar-collapse { background: #1e293b; }
            .nav-link { color: #334155 !important; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 10px 0 !important; }
            body.dark-mode .nav-link { color: white !important; border-bottom-color: rgba(255,255,255,0.1); }
        }

        .nav-link { color: #475569 !important; font-weight: 500; font-size: 15px; }
        body.dark-mode .nav-link { color: #cbd5e1 !important; }

        /* --- БАСКЫЧТАРДЫ КИЧИРЕЙТҮҮ --- */
        .nav-control-btn {
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; background: rgba(0, 0, 0, 0.05); border: 1px solid rgba(0,0,0,0.05);
            color: #334155 !important; margin-left: 6px; cursor: pointer; font-size: 14px; transition: 0.3s;
        }
        body.dark-mode .nav-control-btn { background: rgba(255, 255, 255, 0.1); color: white !important; border-color: rgba(255,255,255,0.1); }

        .search-input-nav {
            width: 0; height: 34px; border: none; border-radius: 10px; outline: none;
            background: rgba(0,0,0,0.05); color: #333; transition: all 0.4s ease; opacity: 0;
        }
        body.dark-mode .search-input-nav { background: rgba(255,255,255,0.1); color: white; }
        .search-input-nav.active { width: 150px; padding: 0 12px; opacity: 1; border: 1px solid rgba(0,0,0,0.1); }

        /* --- ЗАКАЗ ЧАЛУУ --- */
        .call-request-btn {
            position: fixed; bottom: 25px; left: 20px; background: var(--accent-gradient); color: white !important;
            padding: 10px 20px; border-radius: 50px; font-weight: 600; box-shadow: 0 8px 20px rgba(255, 140, 0, 0.3);
            z-index: 1000; border: none; display: flex; align-items: center; gap: 8px; font-size: 13px;
        }

        .navbar-toggler { color: #333 !important; }
        body.dark-mode .navbar-toggler { color: white !important; }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">
                <i class="fas fa-mountain-sun text-primary me-1"></i>TRAVEL<span class="text-primary">KG</span>
            </a>

            <div class="d-flex align-items-center ms-auto order-lg-3">
                <div class="search-wrapper">
                    <form action="{% url 'index' %}" method="GET" id="nav-search-form" class="d-flex align-items-center">
                        <input type="text" name="search_word" id="nav-search-input" class="search-input-nav" placeholder="Издөө...">
                        <button type="button" id="nav-search-btn" class="nav-control-btn"><i class="fas fa-search"></i></button>
                    </form>
                </div>

                <button id="theme-toggle" class="nav-control-btn"><i id="theme-icon" class="fas fa-moon"></i></button>

                <div class="dropdown">
                    <button class="nav-control-btn" data-bs-toggle="dropdown"><i class="fas fa-globe"></i></button>
                    <ul class="dropdown-menu dropdown-menu-end p-2 shadow border-0">
                        <li><a class="dropdown-item" href="javascript:void(0)" onclick="translatePage('ky')">Кыргызча</a></li>
                        <li><a class="dropdown-item" href="javascript:void(0)" onclick="translatePage('ru')">Русский</a></li>
                        <li><a class="dropdown-item" href="javascript:void(0)" onclick="translatePage('en')">English</a></li>
                    </ul>
                </div>

                <button class="navbar-toggler border-0 p-0 ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <i class="fas fa-bars shadow-none"></i>
                </button>
            </div>

            <div class="collapse navbar-collapse order-lg-2" id="navbarNav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'index' %}">Башкы бет</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'tours_page' %}">Турлар</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'about' %}">Биз жөнүндө</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'contact' %}">Байланыш</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <button class="call-request-btn" data-bs-toggle="modal" data-bs-target="#callModal">
        <i class="fas fa-phone-alt"></i> <span>Заказ</span>
    </button>

    <div class="modal fade" id="callModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg p-4" style="border-radius: 20px; background: white; color: #333;">
                <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <h4 class="fw-bold text-center mb-4">Биз сизге чалабыз!</h4>
                <form method="POST" action="{% url 'callback_request' %}">
                    {% csrf_token %}
                    <input type="text" name="name" class="form-control mb-3 p-3 rounded-4" placeholder="Атыңыз" required>
                    <input type="text" name="phone" class="form-control mb-3 p-3 rounded-4" placeholder="Телефон номериңиз" required>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold" style="background: var(--primary-gradient); border:none;">ЖӨНӨТҮҮ</button>
                </form>
            </div>
        </div>
    </div>

    <div id="google_translate_element"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // Издөө логикасы
        const navSearchBtn = document.getElementById('nav-search-btn');
        const navSearchInput = document.getElementById('nav-search-input');
        navSearchBtn.addEventListener('click', () => {
            if (!navSearchInput.classList.contains('active')) {
                navSearchInput.classList.add('active'); navSearchInput.focus();
            } else if (navSearchInput.value.trim() !== "") {
                document.getElementById('nav-search-form').submit();
            }
        });

        // Котормо
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ky', includedLanguages: 'ky,ru,en', autoDisplay: false}, 'google_translate_element');
        }
        function translatePage(lang) {
            const select = document.querySelector("select.goog-te-combo");
            if (select) { select.value = lang; select.dispatchEvent(new Event('change')); }
        }

        // Тема алмаштыруу
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }
        AOS.init();
    </script>
</body>
</html>
