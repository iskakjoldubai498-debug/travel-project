{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelKG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

   <header>
    <div class="logo">Travel<span>KG</span></div>

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="nav-menu" id="nav-menu">
        <div class="menu-header">
            <span class="menu-title">МЕНЮ</span>
            <div class="close-icon" onclick="closeMenu()">&times;</div>
        </div>

        <div class="menu-contact-info">
            <div class="info-row">
                <span class="icon">🕒</span>
                <div>
                    <strong>9:30 - 18:00</strong>
                    <p>Дем алышсыз</p>
                </div>
            </div>
            <div class="info-row">
                <span class="icon">📞</span>
                <strong>+996 550 000 000</strong>
            </div>
        </div>

        <div class="menu-links">
            <a href="{% url 'index' %}" onclick="closeMenu()">Башкы бет</a>
            <a href="{% url 'about' %}" onclick="closeMenu()">Биз жөнүндө</a>
            <a href="{% url 'tours' %}" onclick="closeMenu()">Турлар</a>
            <a href="{% url 'contact' %}" onclick="closeMenu()">Байланыш</a>
        </div>

        <button class="menu-btn-red" onclick="openModal(); closeMenu();">ЧАЛУУНУ БУЮРТМАЛОО</button>
    </nav>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
   </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        const overlay = document.getElementById('menu-overlay');

        // Менюну ачуу
        hamburger.addEventListener('click', () => {
            navMenu.classList.add('active');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Экранды жылдырбоо
        });

        // Менюну жабуу
        function closeMenu() {
            navMenu.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function openModal() {
            const modal = document.getElementById('callbackModal');
            if(modal) modal.style.display = 'flex';
        }
    </script>
</body>
</html>
