{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelKG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

   <header>
    <div class="logo">Travel<span>KG</span></div>

    <div class="hamburger" id="hamburger">
        <span id="close-label">ЗАКРЫТЬ</span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="nav-menu" id="nav-menu">
        <a href="{% url 'index' %}" onclick="closeMenu()">Башкы бет</a>
        <a href="{% url 'about' %}" onclick="closeMenu()">Биз жөнүндө</a>
        <a href="{% url 'tours' %}" onclick="closeMenu()">Турлар</a>
        <a href="{% url 'contact' %}" onclick="closeMenu()">Байланыш</a>
        <button class="mobile-btn" onclick="openModal(); closeMenu();">Чалууну буюртмалоо</button>
    </nav>
   </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="creative-footer">
        <div class="footer-wrap">
            <div class="f-brand">
                <h2>Travel<span class="red">KG</span></h2>
                <p>Ар бир саякат — бул жаңы жашоо.</p>
            </div>
            <div class="f-stats">
                <div class="stat-item"><strong>10+</strong> <small>жыл тажрыйба</small></div>
                <div class="stat-item"><strong>150</strong> <small>кардарлар</small></div>
            </div>
        </div>
        <div class="f-copyright">&copy; 2026 TravelKG.</div>
    </footer>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        const closeLabel = document.getElementById('close-label');

        hamburger.addEventListener('click', () => {
            const isActive = navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');

            // Жабуу жазуусун көрсөтүү/жашыруу
            closeLabel.style.display = isActive ? 'block' : 'none';
            // Экранды жылдырбоо
            document.body.style.overflow = isActive ? 'hidden' : 'auto';
        });

        function closeMenu() {
            navMenu.classList.remove('active');
            hamburger.classList.remove('active');
            closeLabel.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openModal() {
            // Эгер модалдык терезеңиз болсо, бул жерде ачылат
            console.log("Модалка ачылды");
        }
    </script>
</body>
</html>
