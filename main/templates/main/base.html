{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelKG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    /* Жалпы жөндөөлөр */
    :root {
        --primary-color: #ff4b5c;
        --glass-bg: rgba(0, 0, 0, 0.8);
        --blur-val: 15px;
    }

    /* --- PREMIUM MOBILE CSS --- */
    @media screen and (max-width: 768px) {
        /* Башкы беттеги контенттин башын Header жаап калбашы үчүн */
        body {
            padding-top: 65px;
        }

        header {
            height: 65px !important;
            background: rgba(0, 0, 0, 0.85) !important;
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        /* Гамбургер меню (Оң жакта) */
        .hamburger {
            display: flex !important;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            cursor: pointer;
            z-index: 2100;
        }

        /* Тексттердин жана карталардын мобилдик стили */
        main {
            padding: 20px 15px !important; /* Экрандын четинен боштуктар */
        }

        /* Скриншоттогудай тексттерди оңдоо */
        h1, .hero-title {
            font-size: 26px !important;
            line-height: 1.3 !important;
            text-align: center;
            margin-bottom: 15px !important;
        }

        p, .hero-description {
            font-size: 15px !important;
            line-height: 1.6;
            opacity: 0.9;
            text-align: center;
            margin-bottom: 25px !important;
        }

        /* Карточкалар (Туруңуздун блоктору) */
        .card, .tour-item {
            margin-bottom: 25px !important;
            width: 100% !important;
            border-radius: 20px !important;
            overflow: hidden;
        }

        /* Мобилдик модалдык терезе (Заказ звонка) */
        .modal-glass {
            width: 90% !important;
            max-width: 350px;
            padding: 30px 20px !important;
            border-radius: 25px !important;
        }

        .modal-header h2 {
            font-size: 20px !important;
        }

        .modal-form input {
            height: 50px !important;
            font-size: 16px !important; /* iOS'то масштаб өзгөрүп кетпеши үчүн */
            margin-bottom: 15px !important;
        }

        /* Айнек Меню (Full Screen) */
        .nav-menu {
            position: fixed !important;
            top: 0;
            left: 0 !important;
            width: 100% !important;
            height: 100vh !important;
            background: rgba(0, 0, 0, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 20px !important;
            transform: translateX(100%); /* Оң жактан чыгат */
            transition: transform 0.5s ease-in-out;
            z-index: 2000;
            visibility: hidden;
        }

        .nav-menu.active {
            transform: translateX(0);
            visibility: visible;
        }

        .nav-menu a {
            font-size: 20px !important;
            opacity: 1 !important;
            transform: none !important;
        }

        .mobile-btn {
            width: 80%;
            text-align: center;
        }
    }
</style>
</head>
<body>
   <header>
    <div class="logo">Travel<span>KG</span></div>

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="nav-menu" id="nav-menu">
        <a href="{% url 'index' %}" onclick="closeMenu()">Главная</a>
        <a href="{% url 'about' %}" onclick="closeMenu()">О компании</a>
        <a href="{% url 'tours' %}" onclick="closeMenu()">Туры</a>
        <a href="{% url 'contact' %}" onclick="closeMenu()">Контакты</a>
        <button class="mobile-btn" onclick="openModal(); closeMenu();">Заказать звонок</button>
    </nav>

    <button class="btn-call desktop-btn" onclick="openModal()">Заказать звонок</button>
   </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div id="callbackModal" class="modal-overlay">
        <div class="modal-glass">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <h2>Биз сизге <span>чалып жатабыз</span></h2>
                <p>Номериңизди калтырыңыз, биз байланышабыз.</p>
            </div>
            <form class="modal-form" method="POST" action="{% url 'callback_request' %}">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Сиздин атыңыз" required>
                <input type="tel" name="phone" placeholder="+996 (___) __ __ __" required>
                <button type="submit" class="btn-submit-pro">Жиберүү</button>
            </form>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        const navLinks = document.querySelectorAll('.nav-menu a');

        // Менюну ачуу жана жабуу
        hamburger.addEventListener('click', () => {
            const isActive = navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');

            // Scroll lock
            document.body.style.overflow = isActive ? 'hidden' : 'auto';

            // Жылган анимация (stagger effect)
            navLinks.forEach((link, index) => {
                if (isActive) {
                    link.style.transitionDelay = `${(index * 0.1) + 0.2}s`;
                } else {
                    link.style.transitionDelay = '0s';
                }
            });
        });

        function closeMenu() {
            hamburger.classList.remove('active');
            navMenu.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Модалдык терезе функциялары
        function openModal() { document.getElementById('callbackModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('callbackModal').style.display = 'none'; }
        window.onclick = function(event) {
            if (event.target == document.getElementById('callbackModal')) closeModal();
        }
    </script>
</body>
</html>
