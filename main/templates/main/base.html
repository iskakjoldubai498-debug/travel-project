{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelKG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
   <header>
    <div class="logo">Travel<span>KG</span></div>

    <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>

    <nav class="nav-menu">
        <a href="{% url 'index' %}">Главная</a>
        <a href="{% url 'about' %}">О компании</a>
        <a href="{% url 'tours' %}">Туры</a>
        <a href="{% url 'contact' %}">Контакты</a>
    </nav>
    <button class="btn-call desktop-btn" onclick="openModal()">Заказать звонок</button>
   </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="creative-footer">
        <div class="f-copyright">
            &copy; 2026 TravelKG. Бардык укуктар корголгон.
        </div>
    </footer>

    <script>
        const menu = document.querySelector('#mobile-menu');
        const menuLinks = document.querySelector('.nav-menu');

        menu.addEventListener('click', function() {
            menu.classList.toggle('is-active');
            menuLinks.classList.toggle('active');
        });

        function openModal() {
            document.getElementById('callbackModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('callbackModal').style.display = 'none';
        }
    </script>
</body>
</html>
