{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelKG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- PREMIUM MOBILE CSS (Бул жерге кошулду, style.css'ге жазсаңыз да болот) --- */
        @media screen and (max-width: 768px) {
            header {
                height: 65px !important;
                background: rgba(0, 0, 0, 0.7) !important;
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
                position: fixed;
                width: 100%;
                top: 0;
                z-index: 1000;
            }

            /* Apple-style Гамбургер */
            .hamburger {
                display: flex !important;
                flex-direction: column;
                justify-content: space-between;
                width: 28px;
                height: 18px;
                cursor: pointer;
                z-index: 2100;
            }

            .hamburger span {
                display: block;
                width: 100%;
                height: 2px;
                background: #fff;
                border-radius: 10px;
                transition: 0.4s cubic-bezier(0.68, -0.6, 0.32, 1.6);
            }

            .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); background: #ff4b5c; }
            .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
            .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); background: #ff4b5c; }

            /* АЙНЕК МЕНЮ: ТОЛУК ЭКРАН */
            .nav-menu {
                position: fixed !important;
                top: 0;
                left: 0 !important;
                width: 100% !important;
                height: 100vh !important;
                background: rgba(0, 0, 0, 0.9) !important;
                backdrop-filter: blur(25px) !important;
                -webkit-backdrop-filter: blur(25px);
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
                gap: 25px !important;
                transform: translateY(-100%);
                transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
                z-index: 2000;
                visibility: hidden;
            }

            .nav-menu.active {
                transform: translateY(0);
                visibility: visible;
            }

            /* Жазуулар: 16 шрифт жана жылган анимация */
            .nav-menu a {
                font-size: 16px !important;
                font-weight: 500;
                color: #fff !important;
                text-decoration: none;
                text-transform: uppercase;
                letter-spacing: 2px;
                opacity: 0;
                transform: translateY(30px);
                transition: 0.4s ease;
            }

            .nav-menu.active a {
                opacity: 1;
                transform: translateY(0);
            }

            .mobile-btn {
                display: block !important;
                background: linear-gradient(45deg, #ff4b5c, #e63946);
                color: white !important;
                padding: 15px 40px;
                border-radius: 50px;
                border: none;
                font-weight: 600;
                margin-top: 20px;
                opacity: 0;
                transform: translateY(30px);
            }

            .nav-menu.active .mobile-btn {
                opacity: 1;
                transform: translateY(0);
                transition: 0.5s ease 0.6s;
            }

            .desktop-btn { display: none !important; }
        }
    </style>
</head>
<body>
   <header>
    <div class="logo">Travel<span>KG</span></div>

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="nav-menu" id="nav-menu">
        <a href="{% url 'index' %}" onclick="closeMenu()">Главная</a>
        <a href="{% url 'about' %}" onclick="closeMenu()">О компании</a>
        <a href="{% url 'tours' %}" onclick="closeMenu()">Туры</a>
        <a href="{% url 'contact' %}" onclick="closeMenu()">Контакты</a>
        <button class="mobile-btn" onclick="openModal(); closeMenu();">Заказать звонок</button>
    </nav>

    <button class="btn-call desktop-btn" onclick="openModal()">Заказать звонок</button>
   </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div id="callbackModal" class="modal-overlay">
        <div class="modal-glass">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <h2>Биз сизге <span>чалып жатабыз</span></h2>
                <p>Номериңизди калтырыңыз, биз байланышабыз.</p>
            </div>
            <form class="modal-form" method="POST" action="{% url 'callback_request' %}">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Сиздин атыңыз" required>
                <input type="tel" name="phone" placeholder="+996 (___) __ __ __" required>
                <button type="submit" class="btn-submit-pro">Жиберүү</button>
            </form>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        const navLinks = document.querySelectorAll('.nav-menu a');

        // Менюну ачуу жана жабуу
        hamburger.addEventListener('click', () => {
            const isActive = navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');

            // Scroll lock
            document.body.style.overflow = isActive ? 'hidden' : 'auto';

            // Жылган анимация (stagger effect)
            navLinks.forEach((link, index) => {
                if (isActive) {
                    link.style.transitionDelay = `${(index * 0.1) + 0.2}s`;
                } else {
                    link.style.transitionDelay = '0s';
                }
            });
        });

        function closeMenu() {
            hamburger.classList.remove('active');
            navMenu.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Модалдык терезе функциялары
        function openModal() { document.getElementById('callbackModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('callbackModal').style.display = 'none'; }
        window.onclick = function(event) {
            if (event.target == document.getElementById('callbackModal')) closeModal();
        }
    </script>
</body>
</html>
