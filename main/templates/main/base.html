{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel KG | Premium Edition</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* --- НЕГИЗГИ ӨЗГӨРМӨЛӨР --- */
        :root {
            --primary-blue: #3a7bd5;
            --accent-orange: #ff8c00;
            --light-bg: #f8fafc;
            --navbar-light: #e2e8f0;
            --dark-bg: #0f172a;
            --card-dark: #1e293b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- БАЗАЛЫК СТИЛЬ --- */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--light-bg);
            color: #334155;
            transition: var(--transition);
            overflow-x: hidden;
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: #f1f5f9;
        }

        /* --- NAVBAR --- */
        .navbar {
            backdrop-filter: blur(15px);
            background: rgba(226, 232, 240, 0.9) !important;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 10px 0;
            transition: var(--transition);
        }

        body.dark-mode .navbar {
            background: rgba(15, 23, 42, 0.9) !important;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

       /* --- ЛОГОТИПТИН КӨРҮНҮШҮН ОҢДОО --- */
/* Күндүзгү режимде */
.navbar-brand {
    color: #0f172a !important; /* Кара түс */
    transition: var(--transition);
}

/* Түн режиминде логотипти ак кылуу */
body.dark-mode .navbar-brand {
    color: #ffffff !important; /* Ак түс */
}

/* Логотиптин ичиндеги "KG" деген жазууну түн ичинде ачык көк кылуу */
body.dark-mode .navbar-brand .text-primary {
    color: #3fb6ff !important;
}

/* Мобилдик менюнун "гамбургер" баскычын түн ичинде ак кылуу */
body.dark-mode .navbar-toggler {
    color: #ffffff !important;
    border-color: rgba(255, 255, 255, 0.2);
}

body.dark-mode .navbar-toggler i {
    color: #ffffff !important;
}

        /* --- КҮЧТҮҮ ИЗДӨӨ ФУНКЦИЯСЫ --- */
        .search-wrapper { position: relative; }

        .nav-search-container {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 50px;
            padding: 2px 5px;
            width: 40px; /* Баштапкы абалы */
            height: 40px;
            transition: var(--transition);
            border: 1px solid transparent;
            overflow: hidden;
        }

        body.dark-mode .nav-search-container { background: rgba(255, 255, 255, 0.1); }

        .nav-search-container.active {
            width: 280px;
            background: white;
            border-color: var(--primary-blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body.dark-mode .nav-search-container.active {
            background: var(--card-dark);
            border-color: var(--primary-blue);
        }

        .search-input-nav {
            width: 0;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            color: inherit;
            padding: 0;
            transition: var(--transition);
        }

        .nav-search-container.active .search-input-nav {
            width: 100%;
            padding: 0 15px;
        }

        .nav-control-btn {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #475569;
            transition: var(--transition);
        }

        body.dark-mode .nav-control-btn { color: #f1f5f9; }
        .nav-control-btn:hover { background: rgba(0,0,0,0.05); transform: scale(1.1); }
        body.dark-mode .nav-control-btn:hover { background: rgba(255,255,255,0.1); }

      /* --- МОБИЛДИК МЕНЮДА ТЕКСТТИ КӨРСӨТҮҮ --- */
@media (max-width: 991px) {
    /* Күндүзгү режимде менюдагы шилтемелер */
    .navbar-collapse .nav-link {
        color: #334155 !important; /* Кара сыяктуу боз */
        padding: 12px;
        border-radius: 10px;
    }

    /* Түн режиминде менюдагы шилтемелер */
    body.dark-mode .navbar-collapse .nav-link {
        color: #f1f5f9 !important; /* Ак түс */
    }

    /* Түн режиминде меню ачылгандагы фонду тактоо */
    body.dark-mode .navbar-collapse {
        background-color: #1e293b !important; /* Кочкул көк/кара фон */
        border: 1px solid rgba(255,255,255,0.1);
        padding: 15px;
        margin-top: 10px;
    }
}

/* Компьютерде да түн режиминде текстти ак кылуу */
body.dark-mode .nav-link {
    color: #cbd5e1 !important;
}

body.dark-mode .nav-link:hover {
    color: #ffffff !important;
}

        /* --- БАСКЫЧТАР --- */
        .call-request-btn {
            position: fixed; bottom: 30px; left: 30px;
            background: linear-gradient(45deg, var(--accent-orange), #ff5e62);
            color: white !important; padding: 12px 25px; border-radius: 50px;
            font-weight: 600; box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3);
            z-index: 1000; border: none; transition: 0.3s;
        }
        .call-request-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 25px rgba(255, 140, 0, 0.4); }

        /* Google Translate Жашыруу */
        .goog-te-banner-frame, .skiptranslate, #google_translate_element { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">
                <i class="fas fa-mountain-sun text-primary me-1"></i>TRAVEL<span class="text-primary">KG</span>
            </a>

            <div class="d-flex align-items-center ms-auto order-lg-3">

                <div class="search-wrapper me-2">
                    <form action="{% url 'index' %}" method="GET" id="nav-search-form">
                        <div class="nav-search-container" id="search-container">
                            <input type="text" name="search_word" id="nav-search-input"
                                   class="search-input-nav" placeholder="Издөө...">
                            <button type="button" id="nav-search-btn" class="nav-control-btn">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <button id="theme-toggle" class="nav-control-btn me-2">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>

                <div class="dropdown">
                    <button class="nav-control-btn" data-bs-toggle="dropdown">
                        <i class="fas fa-globe"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 p-2" style="border-radius: 12px;">
                        <li><a class="dropdown-item rounded-3" href="javascript:void(0)" onclick="translatePage('ky')">Кыргызча</a></li>
                        <li><a class="dropdown-item rounded-3" href="javascript:void(0)" onclick="translatePage('ru')">Русский</a></li>
                        <li><a class="dropdown-item rounded-3" href="javascript:void(0)" onclick="translatePage('en')">English</a></li>
                    </ul>
                </div>

                <button class="navbar-toggler border-0 ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <div class="collapse navbar-collapse order-lg-2" id="navbarNav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'index' %}">Башкы бет</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'tours_page' %}">Турлар</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'about' %}">Биз жөнүндө</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'contact' %}">Байланыш</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <button class="call-request-btn" data-bs-toggle="modal" data-bs-target="#callModal">
        <i class="fas fa-phone-alt me-2"></i><span>Байланыш</span>
    </button>

    <div class="modal fade" id="callModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg p-4 border-0" style="border-radius: 25px;">
                <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <h3 class="fw-bold text-center mb-4">Биз сизге чалабыз</h3>
                <form method="POST" action="{% url 'callback_request' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="text" name="name" class="form-control p-3 border-0 bg-light rounded-4" placeholder="Атыңыз" required>
                    </div>
                    <div class="mb-4">
                        <input type="text" name="phone" class="form-control p-3 border-0 bg-light rounded-4" placeholder="Телефон номериңиз" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow">ЖӨНӨТҮҮ</button>
                </form>
            </div>
        </div>
    </div>

    <div id="google_translate_element"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // --- 1. Күчтүү издөө логикасы ---
        const searchBtn = document.getElementById('nav-search-btn');
        const searchInput = document.getElementById('nav-search-input');
        const searchContainer = document.getElementById('search-container');
        const searchForm = document.getElementById('nav-search-form');

        searchBtn.addEventListener('click', () => {
            if (!searchContainer.classList.contains('active')) {
                searchContainer.classList.add('active');
                searchInput.focus();
            } else if (searchInput.value.trim() !== "") {
                searchForm.submit();
            } else {
                searchContainer.classList.remove('active');
            }
        });

        // Башка жакты басканда издөөнү жабуу
        document.addEventListener('click', (e) => {
            if (!searchContainer.contains(e.target) && searchInput.value === "") {
                searchContainer.classList.remove('active');
            }
        });

        // --- 2. Күн/Түн режими ---
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // --- 3. Котормо ---
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ky', includedLanguages: 'ky,ru,en'}, 'google_translate_element');
        }
        function translatePage(lang) {
            const select = document.querySelector("select.goog-te-combo");
            if (select) {
                select.value = lang;
                select.dispatchEvent(new Event('change'));
            }
        }

        // --- 4. Анимация ---
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
