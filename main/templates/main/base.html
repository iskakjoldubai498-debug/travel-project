{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel KG | Premium Edition</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* --- 1. GOOGLE TRANSLATE ЖАШЫРУУ --- */
        .goog-te-banner-frame.skiptranslate, .goog-te-banner, #goog-gt-tt, .goog-te-balloon-frame, .skiptranslate {
            display: none !important; visibility: hidden !important;
        }
        body { top: 0px !important; position: static !important; }
        #google_translate_element { display: none !important; }

        /* --- НЕГИЗГИ ДИЗАЙН --- */
        :root {
            --primary-gradient: linear-gradient(45deg, #00d2ff, #3a7bd5);
            --accent-gradient: linear-gradient(45deg, #ff8c00, #ff5e62);
            --dark-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; transition: 0.4s ease; background-color: #f1f5f9; overflow-x: hidden; }
        body.dark-mode { background-color: var(--dark-bg); color: #f1f5f9; }

        /* --- NAVBAR --- */
        .navbar { backdrop-filter: blur(15px); background: rgba(15, 23, 42, 0.95) !important; border-bottom: 1px solid var(--glass-border); padding: 12px 0; z-index: 1050; }
        .navbar-brand { font-size: 24px; letter-spacing: 1px; color: white !important; }

        /* --- ИЗДӨӨ ФУНКЦИЯСЫ --- */
        .search-wrapper { display: flex; align-items: center; position: relative; }
        .search-input-nav {
            width: 0; height: 42px; border: none; border-radius: 12px; outline: none;
            background: var(--glass-bg); color: white; transition: all 0.5s ease; opacity: 0;
        }
        .search-input-nav.active { width: 250px; padding: 0 15px; opacity: 1; border: 1px solid var(--glass-border); }

        .nav-control-btn {
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: white !important;
            margin-left: 10px; cursor: pointer;
        }

        /* --- ЗАКАЗ ЧАЛУУ БАСКЫЧЫ --- */
        .call-request-btn {
            position: fixed; bottom: 30px; left: 30px; background: var(--accent-gradient); color: white !important;
            padding: 15px 30px; border-radius: 50px; font-weight: 700; box-shadow: 0 10px 30px rgba(255, 140, 0, 0.4);
            z-index: 1000; border: none; display: flex; align-items: center; gap: 12px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">
                <i class="fas fa-mountain-sun text-primary me-2"></i>TRAVEL<span class="text-primary">KG</span>
            </a>

            <div class="d-flex align-items-center ms-auto order-lg-3">
                <div class="search-wrapper me-2">
                    <form action="{% url 'index' %}" method="GET" id="nav-search-form" class="d-flex align-items-center">
                        <input type="text" name="search_word" id="nav-search-input" class="search-input-nav" placeholder="Издөө...">
                        <button type="button" id="nav-search-btn" class="nav-control-btn"><i class="fas fa-search"></i></button>
                    </form>
                </div>

                <button id="theme-toggle" class="nav-control-btn"><i id="theme-icon" class="fas fa-moon"></i></button>

                <div class="dropdown">
                    <button class="nav-control-btn" data-bs-toggle="dropdown"><i class="fas fa-globe"></i></button>
                    <ul class="dropdown-menu dropdown-menu-end p-2 shadow border-0">
                        <li><a class="dropdown-item" href="javascript:void(0)" onclick="translatePage('ky')">Кыргызча</a></li>
                        <li><a class="dropdown-item" href="javascript:void(0)" onclick="translatePage('ru')">Русский</a></li>
                        <li><a class="dropdown-item" href="javascript:void(0)" onclick="translatePage('en')">English</a></li>
                    </ul>
                </div>
            </div>

            <div class="collapse navbar-collapse order-lg-2" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link px-3 text-white" href="{% url 'index' %}">Башкы бет</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-white" href="{% url 'tours_page' %}">Турлар</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <button class="call-request-btn" data-bs-toggle="modal" data-bs-target="#callModal">
        <i class="fas fa-phone-alt"></i> Заказ чалуу
    </button>

    <div class="modal fade" id="callModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg p-4" style="border-radius: 25px; background: white; color: #333;">
                <h3 class="fw-bold text-center mb-4">Биз сизге чалабыз!</h3>
                <form method="POST" action="{% url 'callback_request' %}">
                    {% csrf_token %}
                    <input type="text" name="name" class="form-control mb-3 p-3 rounded-4" placeholder="Атыңыз" required>
                    <input type="text" name="phone" class="form-control mb-3 p-3 rounded-4" placeholder="Телефон номериңиз" required>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold" style="background: var(--primary-gradient); border:none;">ЖӨНӨТҮҮ</button>
                </form>
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-success mt-3">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>
    </div>

    <div id="google_translate_element"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // Издөө логикасы
        const navSearchBtn = document.getElementById('nav-search-btn');
        const navSearchInput = document.getElementById('nav-search-input');
        navSearchBtn.addEventListener('click', () => {
            if (!navSearchInput.classList.contains('active')) {
                navSearchInput.classList.add('active'); navSearchInput.focus();
            } else if (navSearchInput.value.trim() !== "") {
                document.getElementById('nav-search-form').submit();
            }
        });

        // Котормо
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ky', includedLanguages: 'ky,ru,en', autoDisplay: false}, 'google_translate_element');
        }
        function translatePage(lang) {
            const select = document.querySelector("select.goog-te-combo");
            if (select) { select.value = lang; select.dispatchEvent(new Event('change')); }
        }

        // Тема
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }
        AOS.init();
    </script>
</body>
</html>
