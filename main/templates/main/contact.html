{% extends 'main/base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    :root {
        --c-bg: #ffffff;
        --c-text: #111827;
        --c-sub: #6b7280;
        --c-border: #e5e7eb;
        --accent-color: #3b82f6;
    }

    body.dark-mode {
        --c-bg: #030712;
        --c-text: #f9fafb;
        --c-sub: #9ca3af;
        --c-border: #1f2937;
        --accent-color: #60a5fa;
    }

    .contact-page {
        font-family: 'Urbanist', sans-serif;
        background-color: var(--c-bg);
        color: var(--c-text);
        padding: 60px 0 100px;
        transition: 0.4s;
    }

    .hero-text {
        font-weight: 800;
        font-size: clamp(2rem, 5vw, 3.5rem);
        letter-spacing: -2px;
        line-height: 1.1;
        margin-bottom: 40px;
    }

    /* Социалдык блоктор */
    .social-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin-bottom: 40px;
    }

    .social-box {
        padding: 25px;
        border-radius: 20px;
        background: var(--c-bg);
        border: 1px solid var(--c-border);
        text-decoration: none;
        color: var(--c-text);
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .social-box i { font-size: 2rem; margin-bottom: 10px; }
    .social-box span { font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; }

    .whatsapp:hover { border-color: #25D366; color: #25D366; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.1); }
    .instagram:hover { border-color: #E4405F; color: #E4405F; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(228, 64, 95, 0.1); }
    .telegram:hover { border-color: #0088cc; color: #0088cc; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 136, 204, 0.1); }

    /* КАРТА - Нурзаман Ош */
    .map-wrapper {
        width: 100%;
        height: 450px;
        border-radius: 30px;
        overflow: hidden;
        margin-bottom: 50px;
        border: 1px solid var(--c-border);
        transition: 0.4s;
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }

    body.dark-mode .map-wrapper {
        filter: grayscale(1) invert(0.9) contrast(1.2) opacity(0.8);
    }

    /* Форма */
    .form-container {
        max-width: 650px;
        margin: 0 auto;
        padding: 40px;
        background: var(--c-bg);
        border-radius: 30px;
        border: 1px solid var(--c-border);
    }

    .minimal-input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 2px solid var(--c-border);
        padding: 15px 5px;
        color: var(--c-text);
        font-size: 1.1rem;
        margin-bottom: 25px;
        outline: none;
        transition: 0.3s;
    }

    .minimal-input:focus {
        border-bottom-color: var(--accent-color);
    }

    .btn-submit {
        background: var(--c-text);
        color: var(--c-bg);
        border: none;
        padding: 18px 0;
        border-radius: 15px;
        font-weight: 700;
        width: 100%;
        letter-spacing: 1px;
        transition: 0.3s;
        cursor: pointer;
    }

    .btn-submit:hover {
        transform: scale(1.02);
        opacity: 0.9;
    }

    @media (max-width: 768px) {
        .form-container { padding: 20px; border: none; }
        .hero-text { font-size: 2.5rem; }
    }
</style>

<div class="contact-page">
    <div class="container text-center">

        <h1 class="hero-text" data-aos="fade-up">Биз Оштобуз, <br> Нурзаман Сити</h1>

        <div class="social-grid" data-aos="fade-up" data-aos-delay="100">
            <a href="https://wa.me/99655356070" class="social-box whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>WHATSAPP</span>
            </a>
            <a href="https://instagram.com/i_235_k" class="social-box instagram" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>INSTAGRAM</span>
            </a>
            <a href="https://t.me/travelkg" class="social-box telegram" target="_blank">
                <i class="fab fa-telegram-plane"></i>
                <span>TELEGRAM</span>
            </a>
        </div>

        <div class="map-wrapper" data-aos="zoom-in" data-aos-delay="200">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3032.8687777443183!2d72.81816737654764!3d40.522394949563214!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x38bdad73c9d9f34b%3A0xcdde329fd28aae70!2zTnVyemFtYW4gUGxhemEgKNCd0YPRgNC30LDQvNCw0L0g0J_Qu9Cw0LfQsCk!5e0!3m2!1sky!2skg!4v1709999999999!5m2!1sky!2skg"
                width="100%"
                height="100%"
                style="border:0;"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <div class="form-container" data-aos="fade-up">
            <h3 class="fw-bold mb-4">Суроо калтыруу</h3>
            <form method="POST" action="{% url 'contact' %}">
                {% csrf_token %}
                <input type="text" name="name" class="minimal-input" placeholder="Сиздин атыңыз" required>
                <input type="text" name="phone" class="minimal-input" placeholder="Телефон номериңиз" required>
                <textarea name="message" class="minimal-input" rows="3" placeholder="Кандай сурооңуз бар?" required></textarea>
                <button type="submit" class="btn-submit">ЖӨНӨТҮҮ</button>
            </form>
        </div>

    </div>
</div>

<script>
    AOS.init({ duration: 1000, once: true });
</script>
{% endblock %}
