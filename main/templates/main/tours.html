{% extends 'main/base.html' %}

{% block content %}
<style>
    /* 1. Жалпы барактын фону */
    .tours-page {
        background-color: #f4f7f6;
        padding: 50px 0;
        transition: background-color 0.4s ease, color 0.4s ease;
        min-height: 100vh;
    }

    body.dark-mode .tours-page {
        background-color: #121212 !important;
    }

    /* 2. Башкы текст */
    .section-title {
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        position: relative;
        margin-bottom: 60px;
        color: #222;
        transition: color 0.4s ease;
    }

    body.dark-mode .section-title {
        color: #ffffff !important;
    }

    .section-title::after {
        content: '';
        width: 80px;
        height: 4px;
        background: #0d6efd;
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
    }

    /* 3. Тур карточкалары */
    .tour-card-wrap {
        position: relative;
        border-radius: 25px;
        overflow: hidden;
        height: 450px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: none;
        background: #fff;
    }

    body.dark-mode .tour-card-wrap {
        background-color: #1e1e1e !important;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .tour-card-wrap:hover {
        transform: translateY(-15px);
        box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }

    .tour-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
    }

    .tour-card-wrap:hover .tour-img {
        transform: scale(1.1);
    }

    /* 4. Градиент жана Текст */
    .card-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 70%;
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 30px;
        color: white;
    }

    body.dark-mode .card-overlay {
        background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
    }

    .tour-price {
        background: #ffc107;
        color: #000;
        padding: 6px 18px;
        border-radius: 50px;
        font-weight: 800;
        font-size: 0.95rem;
        width: fit-content;
        margin-bottom: 12px;
        box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
    }

    .tour-name {
        font-size: 1.7rem;
        font-weight: 700;
        margin-bottom: 8px;
        line-height: 1.2;
    }

    /* 5. Кененирээк баскычы */
    .btn-detail {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s ease;
        background: #0d6efd;
        border: none;
        padding: 10px 25px;
        border-radius: 50px;
        color: white;
        text-decoration: none;
        font-weight: 600;
        display: inline-block;
        margin-top: 15px;
        text-align: center;
    }

    .tour-card-wrap:hover .btn-detail {
        opacity: 1;
        transform: translateY(0);
    }

    .btn-detail:hover {
        background: #0b5ed7;
        color: white;
    }

    /* 6. Реактивдүүлүк */
    @media (max-width: 768px) {
        .tours-page { padding: 30px 0; }
        .tour-card-wrap { height: 380px; }
        .tour-name { font-size: 1.4rem; }
        .btn-detail {
            opacity: 1;
            transform: translateY(0);
            padding: 8px 20px;
            font-size: 0.85rem;
        }
    }
</style>

<div class="tours-page">
    <div class="container">
        <h2 class="text-center section-title" data-aos="fade-down">Биздин Турлар</h2>

        <div class="row g-4">
            {% for tour in tours %}
            <div class="col-lg-4 col-md-6" data-aos="fade-up" data-aos-delay="{{ forloop.counter }}00">
                <div class="card tour-card-wrap shadow-sm">
                    {% if tour.image %}
                        <img src="{{ tour.image.url }}" class="tour-img" alt="{{ tour.title }}">
                    {% else %}
                        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" class="tour-img" alt="Default">
                    {% endif %}

                    <div class="card-overlay">
                        <div class="tour-price">{{ tour.price }} сом</div>
                        <h3 class="tour-name">{{ tour.title }}</h3>
                        <p class="small text-light opacity-75 mb-0">
                            <i class="fas fa-map-marker-alt me-1"></i> {{ tour.description|truncatewords:7 }}
                        </p>
                        <a href="{% url 'tour_detail' tour.id %}" class="btn-detail shadow">Кененирээк</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5" data-aos="zoom-in">
                <div class="p-5 border rounded-3 bg-light d-inline-block">
                    <i class="fas fa-suitcase-rolling fa-3x text-muted mb-3"></i>
                    <h4 class="text-muted">Азырынча турлар кошула элек...</h4>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
